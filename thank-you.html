<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Thank You - Muslim Abaya | muslimabaya.com</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Hind+Siliguri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="site-header.css?v=20260603logo">
    <link rel="stylesheet" href="site-footer.css?v=20260603footen">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
    body {
        font-family: Inter, 'Hind Siliguri', sans-serif;
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top, #fff6dd 0%, #f8f9fb 45%, #eef2f8 100%);
        display: flex;
        flex-direction: column;
        align-items: stretch;
        justify-content: flex-start;
        padding: 0 0 24px;
        text-align: center;
        color: #1f2937;
    }
    #site-header-mount { width: 100%; }
    #site-footer-mount { width: 100%; margin-top: 24px; }
    .container {
        background: rgba(255,255,255,.92);
        border: 1px solid #ececec;
        backdrop-filter: blur(4px);
        width: min(560px, calc(100% - 28px));
        margin: 20px auto 0;
        align-self: center;
        border-radius: 24px;
        padding: 34px 24px;
        box-shadow: 0 20px 40px rgba(0,0,0,.08);
    }
    .icon {
        width: 78px;
        height: 78px;
        margin: 0 auto 16px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        font-size: 38px;
        color: #16a34a;
        background: #ecfdf3;
        border: 2px solid #bbf7d0;
    }
    .thank-message {
        margin: 0;
        font-size: 18px;
        line-height: 1.65;
        color: #374151;
        font-weight: 600;
    }
    .thank-sub {
        font-size: 14px;
        color: #6b7280;
        margin: 10px 0 0;
        line-height: 1.6;
    }
    .order-id-line {
        display: none;
        font-size: 15px;
        color: #111;
        margin: 12px 0 0;
        font-weight: 700;
    }
    .actions {
        margin-top: 24px;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
    }
    .btn {
        text-decoration: none;
        font-weight: 700;
        padding: 12px 20px;
        border-radius: 10px;
        font-size: 15px;
        border: 1px solid #111;
    }
    .btn-dark { background: #111; color: #fff; }
    .btn-light { background: #fff; color: #111; border-color: #d1d5db; }
</style>

    <script src="cart-utils.js?v=20260603cartqty"></script>
    <script>
      (function () {
        var saved = typeof readOrderTracking === 'function' ? readOrderTracking() : null;
        var extra = {};
        if (!saved || !saved.transaction_id) {
          extra.transaction_id = 'order_' + Date.now();
          extra.event_id = extra.transaction_id;
        }
        if (typeof pushPurchaseCompleteEvent === 'function') {
          pushPurchaseCompleteEvent(extra);
        } else if (saved) {
          window.dataLayer = window.dataLayer || [];
          window.dataLayer.push(Object.assign({ event: 'purchase_complete' }, saved, extra));
        }
        if (typeof clearOrderTracking === 'function') clearOrderTracking();
      })();
    </script>
</head>
<body>
    <div id="site-header-mount"></div>

    <div class="container">
        <div class="icon"><i class="fas fa-check"></i></div>
        <p class="thank-message">Thank you! Your order has been received. We will contact you shortly to confirm delivery.</p>
        <p id="orderIdLine" class="order-id-line"></p>
        <p class="thank-sub">Save your order ID for reference, or track your order on our help page.</p>
        <div class="actions">
            <a href="/" class="btn btn-dark"><i class="fas fa-shopping-bag"></i> Continue Shopping</a>
            <a href="https://wa.me/8801971642683" class="btn btn-light" target="_blank" rel="noopener">WhatsApp Us</a>
            <a href="help.html#order-status" class="btn btn-light">Track Order</a>
        </div>
    </div>
    <script>
        if (typeof clearStoreCart === 'function') {
            clearStoreCart();
        }
        if (typeof clearStoreCartSession === 'function') {
            clearStoreCartSession();
        }
        try { sessionStorage.removeItem('cart'); } catch (e) {}
        (function () {
            var oid = '';
            try { oid = sessionStorage.getItem('ma_last_order_id') || ''; } catch (e) {}
            if (oid) {
                var el = document.getElementById('orderIdLine');
                if (el) {
                    el.style.display = 'block';
                    el.textContent = 'Order ID: ' + oid;
                }
            }
        })();
    </script>
    <div id="site-footer-mount"></div>
    <script defer src="site-header.js?v=20260603logo"></script>
    <script src="site-api-config.js?v=20260529"></script>
    <script src="site-footer.js?v=20260603footen"></script>
</body>
</html>
