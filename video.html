<!DOCTYPE html>

<html lang="bn">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Video Collection | Muslim Abaya</title>

  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="site-header.css">

  <link rel="stylesheet" href="site-footer.css">

  <style>

    .wrap { max-width: 900px; margin: 0 auto; padding: 16px 12px 24px; }

    .breadcrumb { font-size:13px;color:#666;margin:0 0 14px;display:flex;flex-wrap:wrap;gap:6px;align-items:center; }

    .breadcrumb a { color:#666; text-decoration:none; }

    .breadcrumb strong { color:#111; }

    .card { background:#fff; border:1px solid #e7e7e7; border-radius:12px; padding:18px; }

    .video { position:relative; width:100%; padding-top:56.25%; border-radius:10px; overflow:hidden; background:#000; }

    .video iframe { position:absolute; inset:0; width:100%; height:100%; border:0; }

    .help { font-size:14px; color:#555; margin-top:12px; line-height:1.6; }

  </style>

</head>

<body>

  <div id="site-header-mount"></div>

  <main class="wrap">

    <nav class="breadcrumb" aria-label="Breadcrumb">

      <a href="/">Home</a><span>›</span><a href="/category">Category</a><span>›</span><strong>Video</strong>

    </nav>

    <div class="card">

      <h1 id="videoTitle" style="margin:0 0 12px;font-size:22px;">ভিডিও কালেকশন</h1>

      <div class="video">

        <iframe id="featuredVideoFrame" src="" allowfullscreen title="Featured video"></iframe>

      </div>

      <p id="videoHelp" class="help"></p>

    </div>

  </main>

  <div id="site-footer-mount"></div>

  <script src="cart-utils.js"></script>
  <script src="site-header.js"></script>

  <script src="category-products.js"></script>

  <script src="site-footer.js"></script>

  <script>

    (function loadFeaturedVideo() {

      var cfg = (window.SITE_MEDIA && window.SITE_MEDIA.featuredVideo) || {};

      var titleEl = document.getElementById("videoTitle");

      var frame = document.getElementById("featuredVideoFrame");

      var helpEl = document.getElementById("videoHelp");

      if (titleEl) titleEl.textContent = cfg.title || "ভিডিও কালেকশন";

      if (frame) frame.src = cfg.embedUrl || "https://www.youtube-nocookie.com/embed/Wyrw0gzKMqk?rel=0&modestbranding=1";

      if (helpEl) helpEl.textContent = cfg.helpText || "রিয়েল ভিডিও দেখে প্রোডাক্টের কোয়ালিটি যাচাই করুন, তারপর অর্ডার করুন।";

    })();

  </script>

</body>

</html>
