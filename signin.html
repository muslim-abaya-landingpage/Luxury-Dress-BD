<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Muslim Abaya</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="site-header.css?v=20260530c">
  <link rel="stylesheet" href="site-footer.css?v=20260530ft11" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="site-footer.css?v=20260530ft11"></noscript>
<link rel="stylesheet" href="auth-page.css">
</head>
<body class="auth-page">
  <div id="site-header-mount"></div>
  <main class="auth-wrap">
    <section class="auth-card">
      <div class="auth-card-head">
        <h1>Sign In</h1>
        <p class="auth-lead">Welcome back — sign in to continue checkout faster.</p>
      </div>
      <form id="signinForm">
        <div class="auth-field">
          <label for="si-login">Email বা Mobile</label>
          <input id="si-login" type="text" placeholder="name@gmail.com বা 017XXXXXXXX" required autocomplete="username">
          <p class="auth-hint">যে ইমেইল/মোবাইল দিয়ে রেজিস্ট্রেশন করেছিলেন তা দিন।</p>
        </div>
        <div class="auth-field">
          <label for="si-pass">Password</label>
          <input id="si-pass" type="password" placeholder="******" required autocomplete="current-password">
          <p class="auth-hint">আপনার অ্যাকাউন্টের পাসওয়ার্ড দিন।</p>
        </div>
        <button type="submit" class="auth-btn" id="signinBtn">Sign In</button>
        <p class="auth-note">নতুন অ্যাকাউন্ট করতে <a href="signup.html" id="signupLink">Sign Up</a></p>
      </form>
    </section>
  </main>
  <div id="site-footer-mount"></div>
  <script src="cart-utils.js"></script>
  <script src="site-security.js"></script>
  <script src="site-api-config.js?v=20260529"></script>
  <script src="site-api-health.js"></script>
  <script src="auth-config.js"></script>
  <script src="auth-api.js"></script>
  <script defer src="site-header.js?v=20260530gtmfix"></script>
  <script src="site-footer.js?v=20260629post"></script>
  <script>
    (function () {
      if (typeof showAuthApiNotice === 'function') {
        showAuthApiNotice('.auth-card');
      }
      var form = document.getElementById('signinForm');
      if (!form) return;
      var params = new URLSearchParams(window.location.search);
      var nextUrl = params.get('next') || 'checkout.html';
      var signupLink = document.getElementById('signupLink');
      if (signupLink && params.get('next')) {
        signupLink.href = 'signup.html?next=' + encodeURIComponent(params.get('next'));
      }
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var login = document.getElementById('si-login').value.trim();
        var pass = document.getElementById('si-pass').value;
        if (!login || !pass) {
          alert('ইমেইল/মোবাইল ও পাসওয়ার্ড দিন।');
          return;
        }
        var btn = document.getElementById('signinBtn');
        btn.disabled = true;
        btn.textContent = 'Saving...';
        MaAuth.login({ login: login, password: pass })
          .then(function () {
            window.location.href = nextUrl;
          })
          .catch(function (err) {
            if (typeof isLocalPreview === 'function' && isLocalPreview()) {
              alert(typeof getLocalFileAuthHint === 'function' ? getLocalFileAuthHint() : 'ADMIN-লোকাল-টেস্ট.bat চালিয়ে http://127.0.0.1/signin.html ব্যবহার করুন।');
              return;
            }
            alert((err && err.message) || 'লগইন ব্যর্থ। ইমেইল/মোবাইল ও পাসওয়ার্ড চেক করুন।');
          })
          .finally(function () {
            btn.disabled = false;
            btn.textContent = 'Sign In';
          });
      });
    })();
  </script>
</body>
</html>
