<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Muslim Abaya</title>
  <link rel="stylesheet" href="site-header.css">
  <link rel="stylesheet" href="site-footer.css">
  <style>
    .auth-wrap { max-width: 520px; margin: 0 auto; padding: 24px 12px 40px; }
    .auth-card { background: #fff; border: 1px solid #ececec; border-radius: 10px; padding: 18px; }
    .auth-card h1 { margin: 0 0 14px; font-size: 28px; }
    .auth-field { margin-bottom: 12px; }
    .auth-field label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 5px; }
    .auth-field input { width: 100%; height: 40px; border: 1px solid #d9d9d9; border-radius: 6px; padding: 0 10px; box-sizing: border-box; }
    .auth-hint { margin-top: 4px; font-size: 12px; color: #666; }
    .auth-btn { width: 100%; border: none; border-radius: 6px; height: 42px; background: #111; color: #fff; font-weight: 700; cursor: pointer; }
    .auth-note { margin-top: 12px; font-size: 13px; color: #444; }
  </style>
</head>
<body>
  <div id="site-header-mount"></div>
  <main class="auth-wrap">
    <section class="auth-card">
      <h1>Sign In</h1>
      <form>
        <div class="auth-field">
          <label for="si-login">Email বা Mobile</label>
          <input id="si-login" type="text" placeholder="name@gmail.com বা 017XXXXXXXX">
          <p class="auth-hint">যে ইমেইল/মোবাইল দিয়ে অ্যাকাউন্ট খুলেছেন সেটাই দিন</p>
        </div>
        <div class="auth-field">
          <label for="si-pass">Password</label>
          <input id="si-pass" type="password" placeholder="******">
          <p class="auth-hint">আপনার অ্যাকাউন্টের পাসওয়ার্ড লিখুন</p>
        </div>
        <button type="button" class="auth-btn">Sign In</button>
        <p class="auth-note">নতুন অ্যাকাউন্ট লাগবে? <a href="signup.html">Sign Up</a></p>
      </form>
    </section>
  </main>
  <div id="site-footer-mount"></div>
  <script src="cart-utils.js"></script>
  <script src="site-header.js"></script>
  <script src="site-footer.js"></script>
</body>
</html>
