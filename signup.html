<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Muslim Abaya</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="site-header.css?v=20260603logo">
  <link rel="stylesheet" href="site-footer.css?v=20260603footen" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="site-footer.css?v=20260603footen"></noscript>
  <link rel="stylesheet" href="auth-page.css">
</head>
<body class="auth-page auth-page-signup">
  <div id="site-header-mount"></div>
  <main class="auth-wrap">
    <section class="auth-card">
      <div class="auth-card-head">
        <h1>Sign Up</h1>
        <p class="auth-lead">Quick register — saved for faster checkout.</p>
      </div>
      <form id="signupForm">
        <div class="auth-field">
          <label for="su-name">Full Name</label>
          <input id="su-name" type="text" placeholder="Your full name" autocomplete="name">
          <p class="auth-hint">Example: Nusrat Jahan</p>
        </div>
        <div class="auth-form-row-2">
          <div class="auth-field">
            <label for="su-mobile">Mobile</label>
            <input id="su-mobile" type="tel" placeholder="017XXXXXXXX" autocomplete="tel">
            <p class="auth-hint">11-digit Bangladesh mobile</p>
          </div>
          <div class="auth-field">
            <label for="su-email">Email</label>
            <input id="su-email" type="email" placeholder="name@gmail.com" autocomplete="email">
            <p class="auth-hint">Valid email address</p>
          </div>
        </div>
        <div class="auth-form-row-2">
          <div class="auth-field">
            <label for="su-pass">Password</label>
            <input id="su-pass" type="password" placeholder="Create a password" autocomplete="new-password">
            <p class="auth-hint">8+ characters with letters and numbers</p>
          </div>
          <div class="auth-field">
            <label for="su-confirm">Confirm</label>
            <input id="su-confirm" type="password" placeholder="Repeat password" autocomplete="new-password">
            <p class="auth-hint">Must match password</p>
          </div>
        </div>
        <button type="submit" class="auth-btn" id="signupBtn">Create Account</button>
        <p class="auth-note">Already have an account? <a href="signin.html" id="signinLink">Sign In</a></p>
      </form>
    </section>
  </main>
  <div id="site-footer-mount"></div>
  <script src="cart-utils.js"></script>
  <script src="site-security.js"></script>
  <script src="site-api-config.js?v=20260529"></script>
  <script src="site-api-health.js"></script>
  <script src="auth-config.js"></script>
  <script src="auth-api.js"></script>
  <script defer src="site-header.js?v=20260603logo"></script>
  <script src="site-footer.js?v=20260603footen"></script>
  <script>
    (function () {
      if (typeof showAuthApiNotice === 'function') {
        showAuthApiNotice('.auth-card');
      }
      var form = document.getElementById('signupForm');
      if (!form) return;
      var params = new URLSearchParams(window.location.search);
      var nextUrl = params.get('next') || 'checkout.html';
      var signinLink = document.getElementById('signinLink');
      if (signinLink && params.get('next')) {
        signinLink.href = 'signin.html?next=' + encodeURIComponent(params.get('next'));
      }
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var name = document.getElementById('su-name').value.trim();
        var phone = document.getElementById('su-mobile').value.trim();
        var email = document.getElementById('su-email').value.trim();
        var pass = document.getElementById('su-pass').value;
        var confirm = document.getElementById('su-confirm').value;
        if (name.length < 2) { alert('Please enter your full name.'); return; }
        if (!/^01\d{9}$/.test(phone.replace(/\s+/g, ''))) { alert('Enter a valid 11-digit mobile number.'); return; }
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { alert('Enter a valid email address.'); return; }
        var strength = MaSecurity.checkPasswordStrength(pass);
        if (!strength.ok) { alert(strength.message); return; }
        if (pass !== confirm) { alert('Passwords do not match.'); return; }
        var btn = document.getElementById('signupBtn');
        btn.disabled = true;
        btn.textContent = 'Creating account...';
        MaAuth.register({ name: name, phone: phone, email: email, password: pass })
          .then(function () {
            window.location.href = nextUrl;
          })
          .catch(function (err) {
            if (typeof isLocalPreview === 'function' && isLocalPreview()) {
              alert(typeof getLocalFileAuthHint === 'function' ? getLocalFileAuthHint() : 'Run the local server and open http://127.0.0.1/signup.html to test sign up.');
              return;
            }
            alert((err && err.message) || 'Registration failed. Please try again.');
          })
          .finally(function () {
            btn.disabled = false;
            btn.textContent = 'Create Account';
          });
      });
    })();
  </script>
</body>
</html>
